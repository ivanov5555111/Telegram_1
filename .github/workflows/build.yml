name: Build WeryGram APK11

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Free Disk Space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          df -h /

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Reset patched files
        run: |
          git checkout HEAD -- TMessagesProj/src/main/java/org/telegram/messenger/UserConfig.java
          git checkout HEAD -- TMessagesProj/src/main/java/org/telegram/messenger/MessagesController.java
          git checkout HEAD -- TMessagesProj/src/main/java/org/telegram/ui/SettingsActivity.java

      - name: Run Patcher Script
        run: |
          if [ -f patcher.py ]; then
            python patcher.py
          else
            echo "Warning: patcher.py not found!"
          fi

      - name: Create local.properties
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
          cat local.properties

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace > build_log.txt 2>&1 || (cat build_log.txt; exit 1)

      - name: Show Build Log on Failure
        if: failure()
        run: |
          echo "=== LAST 300 LINES ==="
          tail -300 build_log.txt
          echo "=== ALL ERRORS ==="
          grep -n "error:\|Caused by:\|Exception" build_log.txt | tail -50

      - name: Find APK Files
        if: success()
        run: find . -name "*.apk" -type f

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WeryGram-Debug-APK
          path: "**/*.apk"
          retention-days: 7

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt
          retention-days: 7
